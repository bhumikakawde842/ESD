<!DOCTYPE html>
<html>
<head>
    <title>Multi Color Change</title>
</head>
<body>

<h2>Background Color Changer 🎨</h2>

<button onclick="startColors()">Start Colors</button>

<script>
let colors = ["red", "yellow", "green", "blue", "purple", "orange"];
let index = 0;

function startColors() {
    setInterval(() => {
        document.body.style.backgroundColor = colors[index];
        index = (index + 1) % colors.length; // loop back
    }, 500); // change every 0.5 sec
}
</script>

</body>
</html>
