<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Machli Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #87CEEB;
            overflow: hidden;
        }

        h1 {
            color: white;
        }

        #gameArea {
            width: 100%;
            height: 80vh;
            position: relative;
        }

        #fish {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        #score {
            font-size: 24px;
            color: white;
        }
    </style>
</head>
<body>

<h1>🐟 Catch the Fish Game</h1>
<div id="score">Score: 0</div>

<div id="gameArea">
    <div id="fish">🐟</div>
</div>

<script>
    let fish = document.getElementById("fish");
    let score = 0;

    function moveFish() {
        let x = Math.random() * (window.innerWidth - 100);
        let y = Math.random() * (window.innerHeight - 150);

        fish.style.left = x + "px";
        fish.style.top = y + "px";
    }

    fish.addEventListener("click", () => {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        moveFish();
    });

    setInterval(moveFish, 1000);
</script>

</body>
</html>
